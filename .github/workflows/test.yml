name: test

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          gleam-version: "1.17.0"
          rebar3-version: "3"
      - run: gleam deps download
      # worldwide ships no country data - generate it before building/testing,
      # exercising both targets' fetch code paths.
      - run: gleam run --target erlang -m worldwide/pull_countries
      - run: gleam run --target javascript -m worldwide/pull_countries
      - run: gleam test --target javascript
      - run: gleam test --target erlang
      - run: gleam format --check src/*.gleam test
